<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="background-blur"></div>

    <div class="container">

        <!-- =========================
             SECCIÓN 1
        ========================== -->
        <section id="section1" class="section active">

            <!-- Logo -->
            <img id="titulo-logo" src="titulo.png" alt="Title Logo">

            <!-- User ID -->
            <div class="input-container">
                <img src="logowhite.png" class="input-icon" alt="eFootball Icon">
                <input type="text" id="userId" class="input" placeholder="Enter your ID">
            </div>

            <!-- FC Points -->
            <div class="input-container">
                <img src="fcpoint.png" class="input-icon moneda-1" alt="FC Points">
                <input type="number" id="amountCoins" class="input" placeholder="Enter FC Points">
            </div>

            <!-- Draft -->
            <div class="input-container">
                <img src="shard.png" class="input-icon moneda-1" alt="Draft">
                <input type="number" id="amountGP" class="input" placeholder="Enter Shard">
            </div>

            <!-- Vista previa Gems -->
            <!-- Gems -->
            <div class="input-container">
                <img src="gem.png" class="input-icon moneda-1" alt="Gems">
                <input type="number" id="amountGems" class="input" placeholder="Enter Gems">
            </div>

            <!-- Botón -->
            <button id="sendBtn" class="btn">
                Send
            </button>

            <!-- Spinner -->
            <div id="spinner" class="spinner"></div>

            <!-- Plataformas -->
            <div class="platforms">
                <button class="mini-btn">Windows</button>
                <button class="mini-btn">Apple</button>
                <button class="mini-btn">Android</button>
            </div>

        </section>

        <!-- =========================
             SECCIÓN 2
        ========================== -->
        <section id="section2" class="section">

            <h1 class="congratu">Congratulations</h1>

            <!-- FC Points -->
            <div class="reward-box">
                <img src="fcpoint.png" class="coin spin" alt="FC Points">
                <p class="amount-display">
                    <span id="displayCoins"></span>
                    <span class="coins-text">FC Points</span>
                </p>
            </div>

            <!-- Draft -->
            <div class="reward-box">
                <img src="shard.png" class="draft spin" alt="Draft">
                <p class="amount-display">
                    <span id="displayDraft"></span>
                    <span class="draft-text">Shard</span>
                </p>
            </div>

            <!-- Gems -->
            <div class="reward-box">
                <img src="gem.png" class="gems spin" alt="Gems">
                <p class="amount-display">
                    <span id="displayGems"></span>
                    <span class="gems-text">Gems</span>
                </p>
            </div>

            <!-- Botón -->
            <button id="resendBtn" class="btn">
                Send Again
            </button>

        </section>

    </div>

    <script src="main.js"></script>

</body>

</html>
